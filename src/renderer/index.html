<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Grove</title>
    <!-- Runtime libraries inject their own <style> tags (style-src
         'unsafe-inline'). Tree-sitter instantiates WASM (script-src
         'wasm-unsafe-eval'). Grammar downloads happen in the main process, so
         connect-src stays 'self'. Local desktop tool, no remote content. -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' 'wasm-unsafe-eval' grove-plugin:; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src 'self' grove-plugin:; worker-src 'self'"
    />
  </head>

  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
